[workspace]
name = "xarray-sql"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[tasks]
postinstall = "pip install --no-build-isolation --no-deps --disable-pip-version-check -e ."
postinstall-maturin = "maturin develop --release"

[dependencies]
python = ">=3.10"
pip = "*"
maturin = ">=1.9,<2.0"
setuptools = ">=61"

[feature.test.dependencies]
pytest = ">=6"
pytest-cov = "*"
mypy = "*"
xarray = ">=2024.7.0"
dask = ">=2024.8.0"
cftime = "*"

[feature.test.pypi-dependencies]
datafusion = "==52.0.0"

[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=xarray_sql --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python-build = "*"
twine = "*"
wheel = "*"
maturin = ">=1.9,<2.0"

[feature.build.tasks]
build-wheel = "maturin build --release --strip"
check-wheel = "twine check target/wheels/*"

[feature.lint.dependencies]
pre-commit = "*"

[feature.lint.tasks]
lint = "pre-commit run --all-files"
lint-install = "pre-commit install"

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.docs.dependencies]
zensical = "*"
mkdocstrings-python = "*"

[feature.docs.tasks]
docs = "zensical serve"
docs-build = "zensical build"

[environments]
default = ["test"]
py310 = ["py310", "test"]
py311 = ["py311", "test"]
py312 = ["py312", "test"]
py313 = ["py313", "test"]
docs = ["docs"]
build = ["build"]
lint = { features = ["lint"], no-default-feature = true }
